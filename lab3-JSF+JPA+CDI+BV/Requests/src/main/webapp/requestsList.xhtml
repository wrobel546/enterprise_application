<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html">
<f:view>
    <h:head>
        <title>Facelet Title</title>
    </h:head>
    <h:body>
    <h:form>
        <h:outputText value="New request"/>
        <h:inputText id="newReqInputText" value="#{requestsList.newRequest}"/>
        <h:commandButton value="Add" action="#{requestsList.addRequest}"/>
        <h:message for="newReqInputText" style="color:red"/>
    <h:dataTable value="#{requestsList.allRequests}" binding="#{requestsList.requestsDataTable}"
                 var="item" border="1" >
    <h:column>
        <f:facet name="header">
            <h:outputText value="Id"/>
        </f:facet>
        <h:outputText value="#{item.id}"/>
    </h:column>
    <h:column>
        <f:facet name="header">
            <h:outputText value="RequestDate"/>
        </f:facet>
        <h:outputText value="#{item.requestDate}"/>
    </h:column>
    <h:column>
    <f:facet name="header">
    <h:outputText value="RequestText"/>
    </f:facet>
        <h:outputText value="#{item.requestText}"/>
        <h:commandButton action="#{requestsList.deleteRequest()}" value="Delete" immediate="true"/>
    </h:column>
    </h:dataTable>
    </h:form>
    </h:body>
</f:view>
</html>
